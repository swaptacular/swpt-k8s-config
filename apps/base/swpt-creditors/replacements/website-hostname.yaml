source:
  kind: ConfigMap
  name: creditors-agent-config
  fieldPath: data.WEBSITE_HOSTNAME
targets:
  - select:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: ingress-website-redirect
    fieldPaths:
      - "metadata.annotations.nginx\\.ingress\\.kubernetes\\.io/permanent-redirect"
    options:
      delimiter: "//"
      index: 1
