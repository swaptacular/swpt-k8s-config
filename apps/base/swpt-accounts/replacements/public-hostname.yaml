source:
  kind: ConfigMap
  name: accounting-authority-config
  fieldPath: data.PUBLIC_HOSTNAME
targets:
  - select:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: ingress-rules
    fieldPaths:
      - spec.rules.*.host
      - spec.tls.*.hosts.*
  - select:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: ingress-website-redirect
    fieldPaths:
      - spec.rules.*.host
      - spec.tls.*.hosts.0
